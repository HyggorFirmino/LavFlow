<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lavanderia Kanban Inteligente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              'sans': ['Poppins', 'sans-serif'],
            },
            colors: {
              'laundry-blue': {
                '50': '#f0f9ff',
                '100': '#e0f2fe',
                '200': '#bae6fd',
                '300': '#7dd3fc',
                '400': '#38bdf8',
                '500': '#0ea5e9',
                '600': '#0284c7',
                '700': '#0369a1',
                '800': '#075985',
                '900': '#0c4a6e',
              },
              'laundry-teal': {
                '50': '#f0fdfa',
                '100': '#ccfbf1',
                '200': '#99f6e4',
                '300': '#5eead4',
                '400': '#2dd4bf',
                '500': '#14b8a6',
                '600': '#0d9488',
                '700': '#0f766e',
                '800': '#115e59',
                '900': '#134e4a',
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #f0f9ff; /* laundry-blue-50 */
        background-image:
          radial-gradient(circle at 100% 100%, transparent 20%, rgba(2, 132, 199, 0.1) 21%, rgba(2, 132, 199, 0.1) 34%, transparent 35%, transparent),
          radial-gradient(circle at 0% 100%, transparent 20%, rgba(2, 132, 199, 0.1) 21%, rgba(2, 132, 199, 0.1) 34%, transparent 35%, transparent) 0px -50px;
        font-family: 'Poppins', sans-serif;
      }
      .dark body {
        background-color: #0f172a; /* slate-900 */
        background-image:
          radial-gradient(circle at 100% 100%, transparent 20%, rgba(30, 64, 175, 0.1) 21%, rgba(30, 64, 175, 0.1) 34%, transparent 35%, transparent),
          radial-gradient(circle at 0% 100%, transparent 20%, rgba(30, 64, 175, 0.1) 21%, rgba(30, 64, 175, 0.1) 34%, transparent 35%, transparent) 0px -50px;
      }
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #e0f2fe; /* laundry-blue-100 */
      }
      .dark ::-webkit-scrollbar-track {
        background: #1e293b; /* slate-800 */
      }
      ::-webkit-scrollbar-thumb {
        background: #7dd3fc; /* laundry-blue-300 */
        border-radius: 4px;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #475569; /* slate-600 */
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #38bdf8; /* laundry-blue-400 */
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: #64748b; /* slate-500 */
      }
      @keyframes toast-in-right {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
      .animate-toast-in {
        animation: toast-in-right 0.5s ease-out forwards;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.11.0",
    "react/": "https://esm.sh/react@^19.1.0/",
    "react": "https://esm.sh/react@^19.1.0",
    "react-dom/": "https://esm.sh/react-dom@^19.1.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-laundry-blue-50 dark:bg-slate-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
